<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="robots" content="noindex,nofollow">
  <title>Le Champ de Mars — Votre avis</title>
  <link rel="preload" as="image" href="./restaurant.jpg" fetchpriority="high">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#1a0a00}

    /* ── HERO ── */
    .hero{position:fixed;inset:0;z-index:0}
    .hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 35%}
    .hero::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.12) 0%,rgba(0,0,0,.38) 38%,rgba(0,0,0,.74) 65%,rgba(0,0,0,.93) 100%)}

    /* ── LANG SWITCHER ── */
    .lang-switcher{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:3px;background:rgba(255,255,255,.14);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:22px;padding:4px;border:1px solid rgba(255,255,255,.22)}
    .lang-btn{background:none;border:none;color:rgba(255,255,255,.65);font-size:11px;font-weight:700;padding:5px 9px;border-radius:18px;cursor:pointer;transition:all .2s;letter-spacing:.5px}
    .lang-btn.active{background:rgba(255,255,255,.92);color:#1a1a1a}

    /* ── CONTAINER ── */
    .container{position:relative;z-index:10;height:100vh;height:100dvh;display:flex;flex-direction:column;justify-content:flex-end;padding:0 18px 36px}

    /* ── RESTAURANT INFO ── */
    .restaurant-info{margin-bottom:18px;opacity:0;transform:translateY(20px);transition:opacity .7s ease,transform .7s ease}
    .restaurant-info.visible{opacity:1;transform:translateY(0)}
    .restaurant-name{font-size:30px;font-weight:800;color:#fff;line-height:1.1;margin-bottom:4px;text-shadow:0 2px 12px rgba(0,0,0,.5);letter-spacing:-.3px}
    .restaurant-meta{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:8px}
    .rating-row{display:flex;align-items:center;gap:6px}
    .rating-stars{position:relative;display:inline-block;font-size:15px;letter-spacing:1px}
    .rating-stars-bg{color:rgba(255,255,255,.3)}
    .rating-stars-fill{position:absolute;top:0;left:0;overflow:hidden;width:50%;color:#FFB800;white-space:nowrap}

    /* ── CARD ── */
    .card{background:rgba(255,255,255,.97);border-radius:22px;padding:24px 20px 22px;opacity:0;transform:translateY(30px);transition:opacity .7s ease .25s,transform .7s ease .25s}
    .card.visible{opacity:1;transform:translateY(0)}
    .greeting{font-size:11px;font-weight:700;color:#9B6A3A;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:6px}
    .question{font-size:21px;font-weight:800;color:#1a1a1a;line-height:1.25;margin-bottom:5px}
    .subtext{font-size:13px;color:#999;margin-bottom:22px}

    /* ── LANDING STARS ── */
    .landing-stars{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
    .lstar{font-size:46px;color:#e0e0e0;cursor:pointer;background:none;border:none;line-height:1;padding:2px;user-select:none;-webkit-user-select:none;transition:color .12s,transform .1s}
    .lstar:active{transform:scale(.88)}
    .landing-hint{text-align:center;font-size:13px;color:#888;min-height:18px;font-style:italic;margin-bottom:4px;transition:opacity .2s}

    .thanks-msg{text-align:center;font-size:14px;color:#1e8e3e;font-weight:700;min-height:18px;opacity:0;transition:opacity .35s}
    .thanks-msg.show{opacity:1}

    /* ── LOADER ── */
    .loader{position:fixed;inset:0;z-index:300;display:flex;align-items:center;justify-content:center;pointer-events:none;transition:opacity .5s}
    .loader-dots{display:flex;gap:8px}
    .loader-dot{width:9px;height:9px;background:rgba(255,255,255,.85);border-radius:50%;animation:ldBounce 1.2s infinite ease-in-out}
    .loader-dot:nth-child(2){animation-delay:.2s}
    .loader-dot:nth-child(3){animation-delay:.4s}
    @keyframes ldBounce{0%,60%,100%{transform:translateY(0);opacity:.7}30%{transform:translateY(-13px);opacity:1}}

    /* ── OVERLAY + SHEET ── */
    .form-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.52);opacity:0;pointer-events:none;transition:opacity .3s}
    .form-overlay.active{opacity:1;pointer-events:all}
    .form-sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;max-height:90vh;max-height:90dvh;overflow-y:auto;transform:translateY(100%);transition:transform .4s cubic-bezier(.32,.72,0,1)}
    .form-overlay.active .form-sheet{transform:translateY(0)}
    .form-handle{width:38px;height:4px;background:#e5e5e5;border-radius:2px;margin:14px auto 0}

    /* ── FORM HEADER ── */
    .form-header{padding:16px 22px 18px;border-bottom:1px solid #f2f2f2;display:flex;align-items:center;gap:12px}
    .form-header-icon{width:38px;height:38px;background:#4285f4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0}
    .form-header-texts{}
    .form-restaurant{font-size:12px;color:#aaa;margin-bottom:1px}
    .form-title{font-size:18px;font-weight:800;color:#1a1a1a}
    .form-close{margin-left:auto;background:none;border:none;font-size:24px;color:#bbb;cursor:pointer;line-height:1;padding:4px}

    /* ── SECTIONS ── */
    .section{padding:20px 22px 0}
    .section-label{font-size:12px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
    .section-label .req{color:#d93025;font-size:13px}

    /* ── STARS IN FORM ── */
    .fstars-row{display:flex;justify-content:center;gap:6px;margin-bottom:4px}
    .fstar{font-size:40px;color:#e0e0e0;cursor:pointer;background:none;border:none;line-height:1;padding:2px;transition:color .1s;user-select:none;-webkit-user-select:none}
    .fstar-hint{text-align:center;font-size:13px;color:#888;min-height:18px;margin-bottom:18px;font-style:italic}

    /* ── CAT STARS ── */
    .cat-grid{display:flex;flex-direction:column;gap:13px;padding-bottom:4px}
    .cat-row{display:flex;align-items:center;justify-content:space-between}
    .cat-name{font-size:14px;color:#1a1a1a;font-weight:500}
    .cat-stars{display:flex;gap:4px}
    .cstar{font-size:24px;color:#e0e0e0;cursor:pointer;background:none;border:none;padding:1px;line-height:1;transition:color .1s;user-select:none;-webkit-user-select:none}

    /* ── CHIPS ── */
    .chips-wrap{display:flex;flex-wrap:wrap;gap:8px;padding-bottom:4px}
    .chip{padding:8px 14px;border:1.5px solid #e0e0e0;border-radius:20px;font-size:13px;color:#555;cursor:pointer;background:#fff;transition:all .15s;user-select:none;font-family:inherit}
    .chip.sel{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8;font-weight:600}

    /* ── TEXTAREA ── */
    .textarea-wrap{padding:20px 22px 0}
    .textarea-lbl{font-size:12px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px}
    .review-textarea{width:100%;padding:13px 14px;border:1.5px solid #e5e5e5;border-radius:13px;font-size:15px;color:#1a1a1a;resize:none;outline:none;font-family:inherit;min-height:96px;background:#fafafa;transition:border-color .2s,background .2s}
    .review-textarea:focus{border-color:#1a73e8;background:#fff}
    .char-count{text-align:right;font-size:11px;color:#bbb;margin-top:4px}

    /* ── DATE + CONTACT ── */
    .finput{width:100%;border:1.5px solid #e5e5e5;border-radius:13px;padding:13px 14px;font-family:inherit;font-size:16px;color:#1a1a1a;outline:none;transition:border-color .2s;-webkit-appearance:none;background:#fafafa}
    .finput:focus{border-color:#1a73e8;background:#fff}
    .ctoggle{display:flex;gap:8px;margin-bottom:12px}
    .ctbtn{flex:1;padding:10px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;font-weight:500;color:#777;cursor:pointer;background:#fff;transition:all .15s;font-family:inherit}
    .ctbtn.active{border-color:#1a73e8;background:#e8f0fe;color:#1a73e8}

    /* ── RGPD ── */
    .rgpd-wrap{padding:18px 22px 4px}
    .rgpd-label{display:flex;align-items:flex-start;gap:10px;font-size:11px;color:#aaa;cursor:pointer;line-height:1.45;padding:12px;background:#f8f8f8;border-radius:10px}
    .rgpd-label input[type=checkbox]{margin-top:1px;flex-shrink:0;width:16px;height:16px;accent-color:#1a73e8;cursor:pointer}
    .req-note{color:#d93025;font-weight:700}

    /* ── SUBMIT ── */
    .submit-wrap{padding:16px 22px 36px}
    .btn-submit{width:100%;padding:16px;background:#1a73e8;color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;min-height:52px;transition:background .15s,transform .1s;font-family:inherit}
    .btn-submit:active:not(:disabled){background:#1557b0;transform:scale(.99)}
    .btn-submit:disabled{background:#e8e8e8;color:#bbb;cursor:not-allowed}

    /* ── SUCCESS ── */
    .success-state{display:none;text-align:center;padding:52px 24px 60px}
    .success-state.visible{display:block}
    .success-icon{font-size:60px;margin-bottom:16px}
    .success-title{font-size:21px;font-weight:800;color:#1a1a1a;margin-bottom:8px}
    .success-text{font-size:14px;color:#777;line-height:1.5}
    .form-body.hidden{display:none}

    /* ── I18N ── */
    [data-lang]{display:none}
  </style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <img src="./restaurant.jpg" alt="Le Champ de Mars" fetchpriority="high">
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="loader-dots">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
</div>

<!-- LANG SWITCHER -->
<div class="lang-switcher">
  <button class="lang-btn" id="btn-fr" onclick="setLang('fr')">FR</button>
  <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
  <button class="lang-btn" id="btn-zh" onclick="setLang('zh')">中文</button>
</div>

<!-- MAIN -->
<div class="container">
  <div class="restaurant-info" id="ri">
    <div class="restaurant-name">Le Champ de Mars</div>
    <div class="restaurant-meta">Bistrot Parisien &middot; Paris 7e &mdash; Tous les jours 6h&ndash;2h</div>
    <div class="rating-row">
      <span class="rating-stars">
        <span class="rating-stars-bg">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
        <span class="rating-stars-fill">&#9733;&#9733;&#9733;&#9733;&#9733;</span>
      </span>
      <span style="font-size:13px;font-weight:700;color:#fff;margin-left:6px">2,5</span>
    </div>
  </div>

  <div class="card" id="card">
    <div class="greeting" id="t-greeting"></div>
    <div class="question" id="t-question"></div>
    <div class="subtext" id="t-subtext"></div>

    <div class="landing-stars" id="landingStars">
      <button class="lstar" id="ls1" onclick="landingStar(1)">&#9733;</button>
      <button class="lstar" id="ls2" onclick="landingStar(2)">&#9733;</button>
      <button class="lstar" id="ls3" onclick="landingStar(3)">&#9733;</button>
      <button class="lstar" id="ls4" onclick="landingStar(4)">&#9733;</button>
      <button class="lstar" id="ls5" onclick="landingStar(5)">&#9733;</button>
    </div>
    <div class="landing-hint" id="landingHint">&nbsp;</div>
    <div class="thanks-msg" id="thanksMsg" id="t-thanks"></div>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div class="form-overlay" id="overlay" onclick="overlayClick(event)">
  <div class="form-sheet" id="sheet">
    <div class="form-handle"></div>

    <div class="success-state" id="success">
      <div class="success-icon">&#128591;</div>
      <div class="success-title" id="t-success-title"></div>
      <div class="success-text" id="t-success-text"></div>
    </div>

    <div class="form-body" id="form-body">

      <div class="form-header">
        <div class="form-header-icon">&#9733;</div>
        <div class="form-header-texts">
          <div class="form-restaurant">Le Champ de Mars</div>
          <div class="form-title" id="t-form-title"></div>
        </div>
        <button class="form-close" onclick="closeForm()">&#215;</button>
      </div>

      <!-- NOTE GLOBALE -->
      <div class="section">
        <div class="section-label" id="t-stars-label"><span class="req">* </span></div>
        <div class="fstars-row">
          <button class="fstar" id="fs1" onclick="setFStar(1)">&#9733;</button>
          <button class="fstar" id="fs2" onclick="setFStar(2)">&#9733;</button>
          <button class="fstar" id="fs3" onclick="setFStar(3)">&#9733;</button>
          <button class="fstar" id="fs4" onclick="setFStar(4)">&#9733;</button>
          <button class="fstar" id="fs5" onclick="setFStar(5)">&#9733;</button>
        </div>
        <div class="fstar-hint" id="fstar-hint"></div>
      </div>

      <!-- CATEGORIES -->
      <div class="section">
        <div class="section-label" id="t-cat-label"></div>
        <div class="cat-grid">
          <div class="cat-row">
            <div class="cat-name" id="c-cuisine-lbl"></div>
            <div class="cat-stars" id="cat-cuisine">
              <button class="cstar" onclick="setCat('cuisine',1)">&#9733;</button>
              <button class="cstar" onclick="setCat('cuisine',2)">&#9733;</button>
              <button class="cstar" onclick="setCat('cuisine',3)">&#9733;</button>
              <button class="cstar" onclick="setCat('cuisine',4)">&#9733;</button>
              <button class="cstar" onclick="setCat('cuisine',5)">&#9733;</button>
            </div>
          </div>
          <div class="cat-row">
            <div class="cat-name" id="c-service-lbl"></div>
            <div class="cat-stars" id="cat-service">
              <button class="cstar" onclick="setCat('service',1)">&#9733;</button>
              <button class="cstar" onclick="setCat('service',2)">&#9733;</button>
              <button class="cstar" onclick="setCat('service',3)">&#9733;</button>
              <button class="cstar" onclick="setCat('service',4)">&#9733;</button>
              <button class="cstar" onclick="setCat('service',5)">&#9733;</button>
            </div>
          </div>
          <div class="cat-row">
            <div class="cat-name" id="c-ambiance-lbl"></div>
            <div class="cat-stars" id="cat-ambiance">
              <button class="cstar" onclick="setCat('ambiance',1)">&#9733;</button>
              <button class="cstar" onclick="setCat('ambiance',2)">&#9733;</button>
              <button class="cstar" onclick="setCat('ambiance',3)">&#9733;</button>
              <button class="cstar" onclick="setCat('ambiance',4)">&#9733;</button>
              <button class="cstar" onclick="setCat('ambiance',5)">&#9733;</button>
            </div>
          </div>
          <div class="cat-row">
            <div class="cat-name" id="c-proprete-lbl"></div>
            <div class="cat-stars" id="cat-proprete">
              <button class="cstar" onclick="setCat('proprete',1)">&#9733;</button>
              <button class="cstar" onclick="setCat('proprete',2)">&#9733;</button>
              <button class="cstar" onclick="setCat('proprete',3)">&#9733;</button>
              <button class="cstar" onclick="setCat('proprete',4)">&#9733;</button>
              <button class="cstar" onclick="setCat('proprete',5)">&#9733;</button>
            </div>
          </div>
        </div>
      </div>

      <!-- CHIPS REPAS -->
      <div class="section" style="padding-top:18px">
        <div class="section-label" id="t-meal-label"></div>
        <div class="chips-wrap" id="chips-repas">
          <div class="chip" onclick="toggleChip('repas',this)" data-fr="D&#233;jeuner" data-en="Lunch" data-zh="午餐"></div>
          <div class="chip" onclick="toggleChip('repas',this)" data-fr="D&#238;ner" data-en="Dinner" data-zh="晚餐"></div>
          <div class="chip" onclick="toggleChip('repas',this)" data-fr="Brunch" data-en="Brunch" data-zh="早午餐"></div>
          <div class="chip" onclick="toggleChip('repas',this)" data-fr="Caf&#233;" data-en="Coffee" data-zh="咖啡"></div>
        </div>
      </div>

      <!-- CHIPS BUDGET -->
      <div class="section" style="padding-top:14px">
        <div class="section-label" id="t-budget-label"></div>
        <div class="chips-wrap" id="chips-budget">
          <div class="chip" onclick="toggleChip('budget',this)" data-fr="&#8722;20&#8364;" data-en="&#8722;&#8364;20" data-zh="20欧以下">&#8722;20&#8364;</div>
          <div class="chip" onclick="toggleChip('budget',this)" data-fr="20&#8211;35&#8364;" data-en="&#8364;20&#8211;35" data-zh="20&#8211;35欧">20&#8211;35&#8364;</div>
          <div class="chip" onclick="toggleChip('budget',this)" data-fr="35&#8211;50&#8364;" data-en="&#8364;35&#8211;50" data-zh="35&#8211;50欧">35&#8211;50&#8364;</div>
          <div class="chip" onclick="toggleChip('budget',this)" data-fr="+50&#8364;" data-en="+&#8364;50" data-zh="50欧以上">+50&#8364;</div>
        </div>
      </div>

      <!-- SERVEUR -->
      <div class="section" style="padding-top:18px;padding-bottom:18px">
        <div class="section-label" id="t-serveur-label"></div>
        <input type="text" class="finput" id="serveurNom" id="t-serveur-placeholder" autocomplete="off">
      </div>

      <!-- CHIPS BRUIT -->
      <div class="section" style="padding-top:14px">
        <div class="section-label" id="t-bruit-label"></div>
        <div class="chips-wrap" id="chips-bruit">
          <div class="chip" onclick="toggleChip('bruit',this)" data-fr="Calme" data-en="Quiet" data-zh="安静"></div>
          <div class="chip" onclick="toggleChip('bruit',this)" data-fr="Normal" data-en="Normal" data-zh="正常"></div>
          <div class="chip" onclick="toggleChip('bruit',this)" data-fr="Bruyant" data-en="Loud" data-zh="嘈杂"></div>
        </div>
      </div>

      <!-- CHIPS ATTENTE -->
      <div class="section" style="padding-top:14px">
        <div class="section-label" id="t-attente-label"></div>
        <div class="chips-wrap" id="chips-attente">
          <div class="chip" onclick="toggleChip('attente',this)" data-fr="Rapide" data-en="Fast" data-zh="快速"></div>
          <div class="chip" onclick="toggleChip('attente',this)" data-fr="Normal" data-en="Normal" data-zh="正常"></div>
          <div class="chip" onclick="toggleChip('attente',this)" data-fr="Long" data-en="Long" data-zh="较长"></div>
          <div class="chip" onclick="toggleChip('attente',this)" data-fr="Tr&#232;s long" data-en="Very long" data-zh="很长"></div>
        </div>
      </div>

      <!-- TEXTAREA -->
      <div class="textarea-wrap">
        <div class="textarea-lbl" id="t-textarea-label"></div>
        <textarea class="review-textarea" id="review-text" maxlength="2000" oninput="onTextInput()"></textarea>
        <div class="char-count"><span id="char-count">0</span>/2000</div>
      </div>

      <!-- DATE -->
      <div class="section" style="padding-top:0;padding-bottom:18px">
        <div class="section-label" id="t-date-label"></div>
        <input type="month" class="finput" id="dateVisite">
      </div>

      <!-- CONTACT -->
      <div class="section" style="padding-top:0;padding-bottom:4px">
        <div class="section-label"><span id="t-contact-label"></span></div>
        <div class="ctoggle">
          <button class="ctbtn active" id="btn-email" onclick="switchContact('email')">&#128231; Email</button>
          <button class="ctbtn" id="btn-phone" onclick="switchContact('phone')" id="t-phone-btn"></button>
        </div>
        <div id="field-email">
          <input type="email" class="finput" id="contactEmail" autocomplete="email" placeholder="votre@email.com">
        </div>
        <div id="field-phone" style="display:none">
          <input type="tel" class="finput" id="contactPhone" autocomplete="tel" placeholder="06 00 00 00 00">
        </div>
      </div>

      <!-- RGPD -->
      <div class="rgpd-wrap">
        <label class="rgpd-label">
          <input type="checkbox" id="rgpd" onchange="refreshSubmit()">
          <span><span id="t-rgpd"></span><span class="req"> *</span></span>
        </label>
      </div>

      <!-- SUBMIT -->
      <div class="submit-wrap">
        <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>
          <span id="t-submit"></span>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
var GOOGLE_LINK   = 'https://search.google.com/local/writereview?placeid=ChIJB0gcnCBw5kcRehrnfDL9Gdg';
var WEBHOOK_FORM  = 'https://nicolasanquetin.app.n8n.cloud/webhook/champs-de-mars-avis-negatif';
var WEBHOOK_CLICK = 'https://nicolasanquetin.app.n8n.cloud/webhook/champs-de-mars-click';

/* ── TRANSLATIONS ── */
var T = {
  fr:{
    g:{morning:'Merci pour votre petit-d&#233;jeuner &#9728;&#65039;',lunch:'Merci pour votre d&#233;jeuner &#127869;&#65039;',afternoon:'Merci pour votre passage &#9749;',dinner:'Merci pour votre d&#238;ner &#127769;',night:'Merci pour votre soir&#233;e &#10024;'},
    question:'Comment s\'est pass&#233; votre moment chez nous ?',
    subtext:'30 secondes &#8212; votre avis nous aide vraiment.',
    ratingCount:'(2 847 avis)',
    thanks:'&#10024; Merci&nbsp;! Redirection vers Google&#8230;',
    formTitle:'Partagez votre exp&#233;rience',
    starsLabel:'Note globale',
    starsHints:['','Terrible','D&#233;cevant','Correct','Bien','Excellent&nbsp;!'],
    catLabel:'D&#233;tail par cat&#233;gorie',
    cats:{cuisine:'Cuisine',service:'Service',ambiance:'Ambiance',proprete:'Propret&#233;'},
    mealLabel:'Type de repas',

/* ── STATE ── */
var lang = 'fr';
var landingNote = 0;
var formNote = 0;
var catNotes = {cuisine:0,service:0,ambiance:0,proprete:0};
var chipSel = {repas:null,budget:null,bruit:null,attente:null};
var contactMode = 'email';

/* ── LANG DETECT ── */
function detectLang(){
  var s = localStorage.getItem('cdm_lang');
  if(s && T[s]) return s;
  var c = (navigator.language||'fr').toLowerCase().slice(0,2);
  if(c==='zh') return 'zh';
  if(c==='en') return 'en';
  return 'fr';
}
function setLang(l){
  lang = l;
  localStorage.setItem('cdm_lang', l);
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('btn-'+l).classList.add('active');
  document.documentElement.lang = l;
  render();
  renderChips();
}

/* ── RENDER ── */
function render(){
  var t = T[lang];
  var h = new Date().getHours();
  var greet = h>=6&&h<11 ? t.g.morning : h>=11&&h<15 ? t.g.lunch : h>=15&&h<19 ? t.g.afternoon : h>=19&&h<23 ? t.g.dinner : t.g.night;
  set('t-greeting', greet);
  set('t-question', t.question);
  set('t-subtext', t.subtext);
  set('t-form-title', t.formTitle);
  document.getElementById('t-stars-label').innerHTML = '<span class="req">* </span>' + t.starsLabel;
  set('t-cat-label', t.catLabel);
  set('c-cuisine-lbl', t.cats.cuisine);
  set('c-service-lbl', t.cats.service);
  set('c-ambiance-lbl', t.cats.ambiance);
  set('c-proprete-lbl', t.cats.proprete);
  set('t-meal-label', t.mealLabel);
  set('t-budget-label', t.budgetLabel);
  set('t-serveur-label', t.serveurLabel);
  document.getElementById('serveurNom').placeholder = t.serveurPlaceholder;
  set('t-bruit-label', t.bruitLabel);
  set('t-attente-label', t.attenteLabel);
  set('t-textarea-label', t.textareaLabel);
  document.getElementById('review-text').placeholder = t.placeholder;
  set('t-date-label', t.dateLabel);
  set('t-contact-label', t.contactLabel);
  document.getElementById('btn-phone').innerHTML = t.phoneBtn;
  set('t-rgpd', t.rgpd);
  set('t-submit', t.submit);
  set('t-success-title', t.successTitle);
  set('t-success-text', t.successText);
  updateLandingHint(landingNote);
  updateFormHint(formNote);
}
function set(id, html){
  var el = document.getElementById(id);
  if(el) el.innerHTML = html;
}

/* ── CHIP LABELS ── */
function renderChips(){
  ['repas','bruit','attente'].forEach(function(group){
    document.querySelectorAll('#chips-'+group+' .chip').forEach(function(c){
      var val = c.getAttribute('data-'+lang);
      if(val) c.textContent = val;
    });
  });
}

/* ── TRACKING ── */
function track(type, data){
  var p = Object.assign({event:type,restaurant:'Le Champ de Mars',ts:Date.now()}, data||{});
  try{ navigator.sendBeacon(WEBHOOK_CLICK, JSON.stringify(p)); }catch(e){}
}

/* ── LANDING STARS ── */
var lEls = ['ls1','ls2','ls3','ls4','ls5'].map(function(id){ return document.getElementById(id); });
function renderLanding(v){
  lEls.forEach(function(s,i){ s.style.color = i<v ? '#FFB800' : '#e0e0e0'; });
}
var HINTS = {
  fr:['','Terrible','Décevant','Correct','Bien','Excellent !'],
  en:['','Terrible','Poor','OK','Good','Excellent!'],
  zh:['','很差','较差','一般','好','极好！']
};
function updateLandingHint(v){
  var el = document.getElementById('landingHint');
  if(el) el.textContent = v>0 ? (HINTS[lang]||HINTS['fr'])[v] : ' ';
}
lEls.forEach(function(s,i){
  s.addEventListener('mouseover', function(){
    lEls.forEach(function(x,j){ x.style.color = j<=i ? '#FFB800' : '#e0e0e0'; });
    document.getElementById('landingHint').textContent = (HINTS[lang]||HINTS['fr'])[i+1];
  });
  s.addEventListener('mouseleave', function(){
    renderLanding(landingNote);
    updateLandingHint(landingNote);
  });
});
function landingStar(v){
  landingNote = v;
  renderLanding(v);
  updateLandingHint(v);
  track(v>=4 ? 'clic_positif' : 'clic_negatif', {note_landing:v});
  if(v>=4){
    document.getElementById('landingStars').style.pointerEvents='none';
    var tm = document.getElementById('thanksMsg');
    tm.innerHTML = T[lang].thanks;
    tm.classList.add('show');
    setTimeout(function(){ window.location.href = GOOGLE_LINK; }, 1600);
  } else {
    setTimeout(function(){ openForm(); setFStar(v); }, 300);
  }
}

/* ── FORM OPEN / CLOSE ── */
function openForm(){
  document.getElementById('overlay').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeForm(){
  document.getElementById('overlay').classList.remove('active');
  document.body.style.overflow='';
}
function overlayClick(e){
  if(e.target===document.getElementById('overlay')) closeForm();
}

/* ── FORM STARS ── */
function updateFormHint(v){
  document.getElementById('fstar-hint').innerHTML = v>0 ? (T[lang].starsHints||HINTS['fr'])[v] : '';
}
function setFStar(v){
  formNote = v;
  for(var i=1;i<=5;i++){
    document.getElementById('fs'+i).style.color = i<=v ? '#FFB800' : '#e0e0e0';
  }
  updateFormHint(v);
  refreshSubmit();
}

/* ── CAT STARS ── */
function setCat(cat, v){
  catNotes[cat]=v;
  document.querySelectorAll('#cat-'+cat+' .cstar').forEach(function(s,i){
    s.style.color = i<v ? '#FFB800' : '#e0e0e0';
  });
}

/* ── CHIPS ── */
function toggleChip(group, el){
  var wrap = document.getElementById('chips-'+group);
  if(wrap) wrap.querySelectorAll('.chip').forEach(function(c){ c.classList.remove('sel'); });
  el.classList.add('sel');
  chipSel[group] = el.textContent.trim();
}

/* ── TEXTAREA ── */
function onTextInput(){
  var len = document.getElementById('review-text').value.length;
  document.getElementById('char-count').textContent = len;
}

/* ── CONTACT ── */
function switchContact(mode){
  contactMode = mode;
  document.getElementById('btn-email').classList.toggle('active', mode==='email');
  document.getElementById('btn-phone').classList.toggle('active', mode==='phone');
  document.getElementById('field-email').style.display = mode==='email' ? '' : 'none';
  document.getElementById('field-phone').style.display = mode==='phone' ? '' : 'none';
}

/* ── SUBMIT ── */
function refreshSubmit(){
  document.getElementById('btn-submit').disabled = !(formNote>0 && document.getElementById('rgpd').checked);
}

/* ── PRE-FILL DATE ── */
(function(){
  var now = new Date();
  document.getElementById('dateVisite').value = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
})();

/* ── SUBMIT FORM ── */
function submitForm(){
  var contact = contactMode==='email'
    ? document.getElementById('contactEmail').value
    : document.getElementById('contactPhone').value;
  var payload = {
    restaurant:'Le Champ de Mars',
    note_globale:formNote,
    note_cuisine:catNotes.cuisine,
    note_service:catNotes.service,
    note_ambiance:catNotes.ambiance,
    note_proprete:catNotes.proprete,
    commentaire:document.getElementById('review-text').value.trim(),
    date_visite:document.getElementById('dateVisite').value,
    type_repas:chipSel.repas,
    budget:chipSel.budget,
    serveur:document.getElementById('serveurNom').value.trim(),
    bruit:chipSel.bruit,
    attente:chipSel.attente,
    contact_type:contactMode,
    contact:contact,
    lang:lang,
    ts:new Date().toISOString()
  };
  fetch(WEBHOOK_FORM,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).catch(function(){});
  track('form_submitted',{note:formNote});
  document.getElementById('form-body').classList.add('hidden');
  document.getElementById('success').classList.add('visible');
  setTimeout(closeForm, 3000);
}

/* ── INIT ── */
window.addEventListener('load', function(){
  var l = detectLang();
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('btn-'+l).classList.add('active');
  document.documentElement.lang = l;
  render();
  renderChips();

  setTimeout(function(){
    var loader = document.getElementById('loader');
    loader.style.opacity = '0';
    setTimeout(function(){ loader.style.display='none'; }, 500);
    document.getElementById('ri').classList.add('visible');
    setTimeout(function(){ document.getElementById('card').classList.add('visible'); }, 220);
  }, 1800);
});
</script>
