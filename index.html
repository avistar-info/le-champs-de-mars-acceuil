.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15),rgba(0,0,0,.55));display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:1.5rem 1.25rem}
.hero-badge{display:inline-block;background:rgba(255,255,255,.18);color:rgba(255,255,255,.9);font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:4px 12px;border-radius:99px;margin-bottom:.6rem}
.hero-title{font-size:28px;font-weight:600;letter-spacing:-.02em;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4)}

.container{max-width:540px;margin:0 auto;padding:0 1.25rem 3rem}

.section{background:#fff;border-radius:12px;padding:1.25rem;margin-top:1rem;border:1px solid #e8eaed}
.section-label{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#9aa0a6;margin-bottom:.75rem}

.info-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f3f4}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.info-icon{width:18px;height:18px;flex-shrink:0;margin-top:1px;color:#5f6368}
.info-text{font-size:14px;color:#3c4043}
.info-text a{color:#1a73e8;text-decoration:none}

.avis-section{background:#fff;border-radius:12px;padding:1.5rem 1.25rem;margin-top:1rem;border:1px solid #e8eaed;text-align:center}
.avis-question{font-size:17px;font-weight:600;color:#202124;margin-bottom:.4rem}
.avis-sub{font-size:13px;color:#5f6368;margin-bottom:1.25rem}
.btns{display:flex;flex-direction:column;gap:10px}
.btn{
  width:100%;padding:16px 18px;
  border-radius:12px;
  font-family:'Google Sans','DM Sans',sans-serif;
  font-size:15px;font-weight:500;
  display:flex;align-items:center;gap:12px;
  text-decoration:none;
  transition:opacity .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  text-align:left;
}
.btn:active{transform:scale(.98);opacity:.85}
.btn-yes{background:#1e8e3e;color:#fff}
.btn-yes:hover{opacity:.9}
.btn-no{background:#f8f9fa;color:#202124;border:1.5px solid #dadce0}
.btn-no:hover{background:#f1f3f4}
.btn-icon{font-size:22px;line-height:1;flex-shrink:0}
.btn-label{flex:1}
.btn-chevron{margin-left:auto;flex-shrink:0;opacity:.6}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-overlay">
    <div class="hero-badge">Paris 7e · Bistrot Parisien</div>
    <div class="hero-title">Le Champ de Mars</div>
  </div>
</div>

<div class="container">

  <div class="section">
    <div class="section-label">Informations</div>
    <div class="info-row">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span class="info-text">Paris 7e</span>
    </div>
    <div class="info-row">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span class="info-text"><a href="tel:+33145510101">01 47 05 43 02</a></span>
    </div>
    <div class="info-row">
      <svg class="info-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="info-text">Ouvert 7j/7 · 6h00 – 2h00</span>
    </div>
  </div>

  <div class="avis-section">
    <div class="avis-question">Comment s'est passé votre moment chez nous ?</div>
    <div class="avis-sub">30 secondes, et votre retour nous aide vraiment.</div>
    <div class="btns">
      <a class="btn btn-yes" href="https://search.google.com/local/writereview?placeid=ChIJB0gcnCBw5kcRehrnfDL9Gdg" target="_blank">
        <span class="btn-icon">⭐</span>
        <span class="btn-label">Ma visite s'est bien passée !</span>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a class="btn btn-no" href="https://champ-de-mars-reviews.carrd.co" target="_blank">
        <span class="btn-icon">⭐</span>
        <span class="btn-label">Ma visite aurait pu être meilleure</span>
        <svg class="btn-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
  </div>
</div>

<script>
(function () {
  var WEBHOOK = 'https://nicolasanquetin.app.n8n.cloud/webhook-test/champs-de-mars-click';
  var RESTAURANT = 'Le Champ de Mars';

  function track(event_type) {
    var payload = JSON.stringify({
      event: event_type,
      timestamp: new Date().toISOString(),
      restaurant: RESTAURANT
    });
    try {
      if (navigator.sendBeacon) {
        navigator.sendBeacon(WEBHOOK, new Blob([payload], { type: 'text/plain' }));
      } else {
        fetch(WEBHOOK, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: payload,
          keepalive: true,
          mode: 'no-cors'
        }).catch(function () {});
      }
    } catch (e) {}
  }

  track('scan_qr');

  document.addEventListener('DOMContentLoaded', function () {
    var btnYes = document.querySelector('.btn-yes');
    if (btnYes) btnYes.addEventListener('click', function () { track('click_satisfait'); });
    var btnNo = document.querySelector('.btn-no');
    if (btnNo) btnNo.addEventListener('click', function () { track('click_insatisfait'); });
  });
})();
</script>
</body>
</html>
